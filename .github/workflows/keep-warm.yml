name: Keep backend warm

# Pings the Cloud Run backend on a schedule so it keeps one instance warm during
# the judging window — the first visitor after a long idle never waits for a cold
# start. This touches no application code; it just knocks on /api/health.
#
# Turn it off after the deadline to stop using compute: GitHub → Actions →
# "Keep backend warm" → "..." → Disable workflow.
#
# Note: GitHub's scheduled runs are best-effort and can be delayed several
# minutes on shared runners. For a rock-solid guarantee during judging, instead
# (or additionally) run:
#   gcloud run services update nestiq-api --region us-central1 --min-instances 1
# and set it back to 0 after the deadline.

# Scheduled pinging is DISABLED — during the evaluation window (Jul 27 - Aug 5)
# the backend is kept warm by Cloud Run min-instances=1, which is more reliable
# than a cron. This workflow is kept only as a manual fallback. To go back to
# the free scheduled option, restore the `schedule:` block and set
# min-instances back to 0.
on:
  workflow_dispatch: {}       # manual only — run from the Actions tab if needed
  # schedule:
  #   - cron: '*/5 * * * *'   # (disabled) every 5 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm the backend
        run: |
          curl -fsS --max-time 60 \
            https://nestiq-api-603719952072.us-central1.run.app/api/health \
            || echo "warm ping failed (non-fatal)"
